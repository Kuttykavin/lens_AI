<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<title>ScreenSentry — Login</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#07070f; 
    background-image:
      radial-gradient(circle at 20% 30%, rgba(123,47,255,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(0,212,255,0.15) 0%, transparent 50%);
    color:#e8e8ff;
    font-family:'Segoe UI',Arial,sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:24px;
    position:relative; overflow:hidden;
  }
  body::before {
    content:''; position:absolute; inset:0;
    background:url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse"><path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/></pattern></defs><rect width="100%" height="100%" fill="url(%23grid)"/></svg>');
    pointer-events:none;
  }
  .shield { 
    font-size:4.5rem; margin-bottom:12px; 
    filter:drop-shadow(0 0 20px rgba(0,212,255,0.5));
    animation:float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform:translateY(0); }
    50% { transform:translateY(-10px); }
  }
  h1 { 
    font-size:1.8rem; font-weight:800; 
    background:linear-gradient(135deg,#00d4ff,#7b2fff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:6px; 
    letter-spacing:1px;
  }
  .sub { font-size:0.88rem; color:#4a4a6a; margin-bottom:40px; }

  .card {
    background:rgba(14,14,34,0.6); 
    backdrop-filter:blur(20px) saturate(180%);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    border-radius:20px; padding:32px 28px;
    width:100%; max-width:400px; 
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 8px 40px rgba(0,0,0,0.4);
    position:relative; z-index:1;
  }
  .field-label { 
    font-size:0.72rem; 
    background:linear-gradient(135deg,#00d4ff,#7b2fff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    text-transform:uppercase;
    letter-spacing:1.2px; margin-bottom:8px; font-weight:700; 
  }
  .field-wrap { 
    border:1px solid rgba(74,74,106,0.5); 
    border-radius:12px; overflow:hidden;
    margin-bottom:20px; 
    background:rgba(26,26,46,0.6);
    backdrop-filter:blur(10px);
    transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .field-wrap:focus-within { 
    border-color:#00d4ff; 
    box-shadow:0 0 20px rgba(0,212,255,0.3);
    transform:translateY(-2px);
  }
  input {
    width:100%; padding:14px 16px; background:transparent;
    border:none; outline:none; color:#e8e8ff; font-size:1rem;
  }
  .error {
    background:rgba(255,51,102,0.15); 
    border:1px solid rgba(255,51,102,0.4); 
    border-radius:12px;
    padding:12px 16px; font-size:0.85rem; color:#ff3366;
    margin-bottom:20px; text-align:center;
    backdrop-filter:blur(10px);
    box-shadow:0 4px 16px rgba(255,51,102,0.2);
  }
  .btn-login {
    width:100%; padding:16px; 
    background:linear-gradient(135deg,#7b2fff,#00d4ff);
    border:none; border-radius:12px; color:#fff; font-size:1rem;
    font-weight:700; cursor:pointer; letter-spacing:1px;
    transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow:0 4px 20px rgba(123,47,255,0.4);
    position:relative; overflow:hidden;
  }
  .btn-login::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);
    opacity:0; transition:opacity 0.3s;
  }
  .btn-login:hover::before { opacity:1; }
  .btn-login:hover {
    transform:translateY(-2px);
    box-shadow:0 6px 28px rgba(123,47,255,0.6);
  }
  .btn-login:active { transform:scale(0.98); }
  .footer { margin-top:24px; font-size:0.75rem; color:#4a4a6a; text-align:center; }
</style>
</head>
<body>
  <div class="shield">🛡</div>
  <h1>ScreenSentry</h1>
  <p class="sub">Admin Portal — Authorized Access Only</p>

  <div class="card">
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="field-label">Username</div>
      <div class="field-wrap">
        <input type="text" name="username" placeholder="Enter username"
               autocomplete="off" autocapitalize="none" required>
      </div>

      <div class="field-label">Password</div>
      <div class="field-wrap">
        <input type="password" name="password" placeholder="Enter password" required>
      </div>

      <button type="submit" class="btn-login">LOGIN →</button>
    </form>
  </div>

  <p class="footer">ScreenSentry v2.0 • Secured with bcrypt</p>
</body>
</html>
